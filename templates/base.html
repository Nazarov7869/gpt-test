<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Murojaatlar{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="topbar">
    <h1>Jizzax Virtual Qabulxona</h1>
    <nav>
      {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}">Dashboard</a>
        {% if user.is_staff %}<a href="{% url 'admin_appeals' %}">Admin panel</a>{% endif %}
        <form method="post" action="{% url 'logout' %}" class="inline">{% csrf_token %}<button type="submit">Chiqish</button></form>
      {% else %}
        <a href="{% url 'login' %}">Kirish</a>
        <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% for message in messages %}<p class="message">{{ message }}</p>{% endfor %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
